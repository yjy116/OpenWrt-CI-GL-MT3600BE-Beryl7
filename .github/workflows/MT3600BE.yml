name: MT3600BE

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: OpenWrt source branch to build
        required: true
        default: main
        type: string
      feeds_profile:
        description: Feed profile to use
        required: true
        default: immortalwrt-compatible
        type: choice
        options:
          - immortalwrt-compatible
          - openwrt-official
      pin_mt76_known_good:
        description: Pin mt76 to the #35 known-good WiFi snapshot
        required: true
        default: true
        type: boolean
      cleanup_runner:
        description: Free runner disk space before build
        required: true
        default: true
        type: boolean
      publish_release:
        description: Publish a GitHub prerelease after a successful build
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - .github/workflows/MT3600BE.yml
      - .github/workflows/WRT-CORE.yml
      - Config/**
      - Scripts/**
      - files/**

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      wrt_config: MT3600BE
      wrt_name: GL-MT3600BE
      wrt_device_name: glinet_gl-mt3600be
      wrt_device_dts: mt7987a-glinet-gl-mt3600be
      wrt_theme: aurora
      wrt_branch: ${{ inputs.openwrt_branch || 'main' }}
      feeds_profile: ${{ inputs.feeds_profile || 'immortalwrt-compatible' }}
      pin_mt76_known_good: ${{ github.event_name == 'push' || inputs.pin_mt76_known_good }}
      cleanup_runner: ${{ github.event_name == 'push' || inputs.cleanup_runner }}
      publish_release: ${{ github.event_name == 'push' || inputs.publish_release }}
